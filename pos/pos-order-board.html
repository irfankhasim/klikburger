<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Senarai pesanan — Klik Burger</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/pos-ops-shared.css" />
    <script>
      try {
        if (window.self !== window.parent) document.documentElement.classList.add("kb-embed");
      } catch (e) {}
    </script>
  </head>
  <body>
    <div class="ops-app">
      <h1 class="sr-only">Senarai pesanan</h1>
      <p id="kb-board-rbac" class="ops-muted" style="margin: 0 0 0.65rem; padding: 0.5rem 0.65rem; border: 1px solid var(--border); border-radius: 8px; display: none" role="status" hidden></p>

      <div class="ops-kanban" id="kb-root"></div>
    </div>
    <script type="module" src="../js/pos-order-board-app.js"></script>
  </body>
</html>
