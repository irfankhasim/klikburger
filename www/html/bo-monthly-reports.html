<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Perniagaan — Tab Kaunter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/bo-monthly-reports.css" />
    <script>
      try { if (window.self !== window.parent) { document.documentElement.classList.add("kb-embed"); } } catch (e) {}
    </script>
  </head>
  <body class="staff-dash">
    <div class="mr-app" id="mr-root">

      <header class="mr-header kb-page-header">
        <h1 class="sr-only">Laporan Perniagaan</h1>
      </header>

      <section class="mr-toolbar" aria-label="Penapis laporan">
        <div class="mr-toolbar__row">
          <div class="mr-field">
            <span class="mr-field__label">Tahun</span>
            <select id="mr-year" class="mr-select"></select>
          </div>
          <div class="mr-field">
            <span class="mr-field__label">Bulan</span>
            <select id="mr-month" class="mr-select"></select>
          </div>
          <div class="mr-toolbar__actions">
            <button type="button" class="btn btn--primary" id="mr-generate">
              <i class="fa-solid fa-file-circle-plus" aria-hidden="true"></i> Jana laporan
            </button>
            <button type="button" class="btn btn--primary" id="mr-download-pdf" disabled>
              <i class="fa-solid fa-file-pdf" aria-hidden="true"></i> Muat turun PDF
            </button>
          </div>
        </div>
      </section>

      <script>
        (function () {
          var labels = ["Jan","Feb","Mac","Apr","Mei","Jun","Jul","Ogs","Sep","Okt","Nov","Dis"];
          var now = new Date();
          var cy = now.getFullYear();
          var yEl = document.getElementById("mr-year");
          var mEl = document.getElementById("mr-month");
          if (yEl) {
            for (var y = cy; y >= cy - 6; y--) {
              var o = document.createElement("option");
              o.value = String(y); o.textContent = String(y);
              yEl.appendChild(o);
            }
            yEl.value = String(cy);
          }
          if (mEl) {
            for (var mi = 1; mi <= 12; mi++) {
              var om = document.createElement("option");
              om.value = String(mi);
              om.textContent = labels[mi-1] + " (" + mi + ")";
              mEl.appendChild(om);
            }
            mEl.value = String(now.getMonth() + 1);
          }
        })();
      </script>

      <p id="mr-status" class="mr-status mr-status--hidden" role="status" aria-live="polite"></p>

      <div id="mr-report-body"></div>

    </div>
    <script type="module" src="../js/bo-monthly-reports-app.js"></script>
    <link rel="stylesheet" href="../css/ai-floating-widget.css" />
    <script type="module" src="../js/ai-assistant/global-widget-bootstrap.js"></script>
  </body>
</html>
